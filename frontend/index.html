<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Akompta AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#14532d', // Deep Green
              secondary: '#dcece6', // Light Mint
              accent: '#34d399', // Brighter green for charts/accents
              surface: '#ffffff',
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      html, body {
        min-height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #e5e7eb; /* Neutral background for desktop view */
        -webkit-font-smoothing: antialiased;
        font-family: 'Poppins', sans-serif;
        overflow-y: auto; /* Allow vertical scrolling */
      }
      /* Dark mode body background */
      .dark body {
        background-color: #111827;
        color: #f3f4f6;
      }
      #root {
        min-height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center; /* Center app on desktop */
        align-items: center;
        padding: 20px 0; /* Add vertical padding so app isn't stuck to edges */
      }
      /* Hide scrollbar for clean UI but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
